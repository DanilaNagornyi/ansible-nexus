---
- name: Install NodeJS and npm
  hosts: webserver
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        force_apt_get: yes
        cache_valid_time: 3600
    - name: Install NodeJS
      apt:
        pkg:
         - nodejs
         - npm

- name: Create new linux user for application
  hosts: webserver
  vars_files:
    project-vars.yaml
  tasks:
    - name: Create user 'appuser'
      user:
        name: "{{linux_name}}"
        comment: "Linux User"
        group: admin

- name: Deploy NodeJS application
  hosts: webserver
  become: True
  become_user: "{{linux_name}}"
  vars_files:
    project-vars.yaml
  tasks:
    - name: Extract application files
      unarchive:
        src: "{{location}}/nodejs-app-{{version}}.tgz"
        dest: "{{user_home_dir}}"
    - name: Install application dependencies
      npm:
        path: "{{user_home_dir}}/package"
    - name: Start application
      command:
        chdir: "{{user_home_dir}}/package/app"
        cmd: node server
      async: 1000
      poll: 0
    - name: Ensure application is running
      shell: ps aux | grep node | grep -v grep
      register: app_status
    - debug:
        msg: "{{ app_status.stdout_lines }}"
